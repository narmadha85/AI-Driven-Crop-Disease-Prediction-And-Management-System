<!DOCTYPE html>
<html>

<head>

  <title>Dashboard</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <h1>AI Crop Disease Prediction Dashboard</h1>

  <input type="text"
         id="searchInput"
         placeholder="Search Crop Name">

  <table border="1" width="100%">

    <thead>

      <tr>

        <th>ID</th>
        <th>Crop Name</th>
        <th>Disease</th>
        <th>Confidence</th>
        <th>Date</th>
        <th>Action</th>

      </tr>

    </thead>

    <tbody id="tableBody">

      <tr>

        <td>1</td>
        <td>Tomato</td>
        <td>Leaf Spot</td>
        <td>95%</td>
        <td>17-06-2026</td>

        <td>
          <button onclick="deleteRow(this)">
            Delete
          </button>
        </td>

      </tr>

      <tr>

        <td>2</td>
        <td>Rice</td>
        <td>Blast</td>
        <td>90%</td>
        <td>17-06-2026</td>

        <td>
          <button onclick="deleteRow(this)">
            Delete
          </button>
        </td>

      </tr>

      <tr>

        <td>3</td>
        <td>Potato</td>
        <td>Early Blight</td>
        <td>92%</td>
        <td>17-06-2026</td>

        <td>
          <button onclick="deleteRow(this)">
            Delete
          </button>
        </td>

      </tr>

    </tbody>

  </table>

  <script src="dashboard.js"></script>

</body>

</html>
